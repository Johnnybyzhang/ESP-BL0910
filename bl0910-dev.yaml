esphome:
  name: bl0910-dev

esp32:
  variant: esp32s3
  board: esp32-s3-devkitc1-n8r8
  flash_size: 8MB
  framework:
    type: esp-idf

psram:
  mode: quad 
  speed: 80MHz

# Enable logging
logger:
  level: DEBUG
  logs:
    bl0910: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: "2O+43ybWqbMFLMFxpAlnTpYdjs32z+Anbu3DYCdy1eE="

ota:
  - platform: esphome
    password: "2O+43ybWqbMFLMFxpAlnTpYdjs32z+Anbu3DYCdy1eE="

# W5500 Ethernet
ethernet:
  type: W5500
  clk_pin: GPIO12
  mosi_pin: GPIO11
  miso_pin: GPIO13
  cs_pin: GPIO10
  interrupt_pin: GPIO14
  reset_pin: GPIO15

# External components - load BL0910 from local folder
external_components:
  - source:
      type: local
      path: components

# SPI bus for BL0910
# BL0910 uses SPI Mode 1 (CPOL=0, CPHA=1), max 1.5MHz
spi:
  - id: bl0910_spi
    clk_pin: GPIO36
    mosi_pin: GPIO35
    miso_pin: GPIO37
    interface: spi3

# BL0910 10-phase energy metering chip
bl0910:
  id: bl0910_chip
  spi_id: bl0910_spi
  cs_pin: GPIO34
  reset_pin: GPIO33
  irq_pin: GPIO38
  mode: 1U10I
  line_frequency: 50Hz
  # Calibration constants - adjust these based on your hardware
  # For typical 1mOhm shunt and 1k:1M voltage divider:
  voltage_reference: 1.0
  current_reference: 1.0
  power_reference: 1.0
  energy_reference: 1.0
  update_interval: 5s

# Sensors from BL0910
sensor:
  - platform: bl0910
    bl0910_id: bl0910_chip
    
    # Global measurements
    voltage:
      name: "Voltage"
      id: bl0910_voltage
    frequency:
      name: "Line Frequency"
      id: bl0910_frequency
    temperature:
      name: "BL0910 Temperature"
      id: bl0910_temperature
    total_power:
      name: "Total Power"
      id: bl0910_total_power
    total_energy:
      name: "Total Energy"
      id: bl0910_total_energy
    
    # Channel 1
    channel_1:
      current:
        name: "Channel 1 Current"
        id: ch1_current
      power:
        name: "Channel 1 Power"
        id: ch1_power
      energy:
        name: "Channel 1 Energy"
        id: ch1_energy
    
    # Channel 2
